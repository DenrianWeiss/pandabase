database:
  host: localhost
  port: "5432"
  user: pandabase
  password: pandabase
  name: pandabase
  ssl_mode: disable
  log_level: error
  fts_dictionary: simple  # Full-text search dictionary: simple, english, jieba etc.
  use_halfvec: false     # Use half-precision vectors for dimensions > 2000 (requires pgvector 0.8.0+)

redis:
  host: localhost
  port: "6379"
  password: ""
  db: 0

# File storage configuration
storage:
  type: filesystem  # Options: filesystem, memory
  data_path: ./data/files  # Path for storing uploaded files
  max_file_size: 100  # Maximum file size in MB

server:
  host: 0.0.0.0
  port: "8080"

log:
  level: info
  format: json

# Embedding configuration
# IMPORTANT: The dimensions value CANNOT be changed after database initialization!
embedding:
  # API endpoint - supports any OpenAI-compatible API
  # Examples:
  #   - OpenAI: https://api.openai.com/v1
  #   - OpenRouter: https://openrouter.ai/api/v1
  #   - Doubao/Volcano: https://ark.cn-beijing.volces.com/api/v3
  api_url: https://openrouter.ai/api/v1
  
  # Model name - depends on your API provider
  # Examples:
  #   - OpenAI: text-embedding-ada-002, text-embedding-3-small, text-embedding-3-large
  #   - OpenRouter: qwen/qwen3-embedding-8b
  #   - Doubao: doubao-embedding-vision-250615 (multimodal), doubao-embedding-text-240715
  model: qwen/qwen3-embedding-8b
  
  # Embedding dimensions - must match your model
  # Common values: 1536 (OpenAI), 4096 (Qwen), 2048 (Doubao)
  dimensions: 4096
  
  # Multimodal mode (Doubao only)
  # When enabled, uses /embeddings/multimodal endpoint for image+text support
  enable_multimodal: false
  
  # API key
  api_key: ""

# Authentication configuration
auth:
  # JWT secret - leave empty to auto-generate (changes on every restart!)
  jwt_secret: ""
  jwt_expiry: "24h"
  refresh_token_expiry: "168h"
  
  # OAuth configuration (optional)
  enable_oauth: false
  oauth_providers:
    google:
      enabled: false
      client_id: ""
      client_secret: ""
      redirect_url: "http://localhost:8080/api/v1/oauth/google/callback"
    github:
      enabled: false
      client_id: ""
      client_secret: ""
      redirect_url: "http://localhost:8080/api/v1/oauth/github/callback"
