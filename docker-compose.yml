version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: pandabase-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-pandabase}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pandabase}
      POSTGRES_DB: ${DB_NAME:-pandabase}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pandabase} -d ${DB_NAME:-pandabase}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pandabase-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
